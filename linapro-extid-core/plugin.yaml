# Plugin identifier, unique across the host and source plugin directories; use `kebab-case`.
# 插件唯一标识，必须在宿主和源码插件目录中保持唯一，并使用 `kebab-case` 命名风格。
id: linapro-extid-core

# Plugin display name used in plugin management pages, developer docs, and presentation.
# 插件显示名称，用于插件管理页面、开发文档和展示。
name: External Identity Core

# Plugin semantic version; examples in this repo use the `v` prefix.
# 插件语义化版本号，当前示例统一使用带 `v` 前缀的写法。
version: v0.1.0

# Plugin type enum. Allowed values: `source` is compiled with the host; `dynamic` is loaded as a runtime plugin artifact.
# 插件类型枚举。可选值：`source` 表示随宿主源码编译交付；`dynamic` 表示作为运行时动态插件产物加载。
type: source

# Plugin distribution governance enum. `managed` keeps this domain plugin
# explicitly governed through plugin management; it is NOT a host-critical
# builtin and is not auto-installed on startup. When not installed or disabled,
# external-identity capabilities fail closed and dependent UI is hidden.
# 插件分发治理枚举。`managed`表示本领域插件通过插件管理显式治理；它不是宿主关键
# builtin，宿主启动不会自动安装。未安装或禁用时外部身份能力 fail-closed，依赖 UI 隐藏。
distribution: managed

# Multi-tenant scope enum. Allowed values: `platform_only` is platform-context only; `tenant_aware` is governed by tenant context.
# 多租户作用域枚举。可选值：`platform_only` 表示仅平台上下文可见和治理；`tenant_aware` 表示按租户上下文治理。
scope_nature: platform_only

# Multi-tenant support flag. `true` means the plugin supports tenant-level installation and provisioning governance.
# 多租户支持标记。`true` 表示插件支持租户级安装与开通治理。
supports_multi_tenant: false

# Default install mode enum. Allowed values: `global` enables one shared installation; `tenant_scoped` enables or disables per tenant.
# 默认安装模式枚举。可选值：`global` 表示全局统一安装启用；`tenant_scoped` 表示按租户独立启用或禁用。
default_install_mode: global

# Plugin description summarizing the capability boundary.
# 插件说明，概述插件的能力边界。
description: Official source plugin for third-party login identity linking and account provisioning. OAuth login plugins such as Google and Discord depend on it.

# Plugin author or owning team.
# 插件作者或归属团队。
author: linapro

# Plugin homepage or documentation URL for extra project, design, or external references.
# 插件主页或文档地址，用于补充项目介绍、设计文档或外部说明链接。
homepage: https://example.com/lina/plugins/linapro-extid-core

# Plugin license identifier.
# 插件许可证标识。
license: Apache-2.0

# Plugin internationalization config. This follows the host i18n config shape;
# enabled plugins must ship manifest/i18n resources for the listed locales.
# 插件国际化配置。该配置与宿主 i18n 配置结构保持一致；启用后需提供对应语言资源。
i18n:
  enabled: true
  default: en-US
  locales:
    - locale: en-US
      nativeName: English
    - locale: zh-CN
      nativeName: 简体中文

# Plugin menu declaration list. Installing this domain plugin creates the
# shared Auth Login catalog directory used by Google/Discord and future
# third-party authorization login plugins (QQ/WeChat/Douyin/LDAP, etc.).
# 插件菜单声明列表。安装本领域插件时创建共享的「授权登录」目录，供 Google、
# Discord 以及后续 QQ/微信/抖音/LDAP 等第三方授权登录插件挂载设置页。
menus:
  # Shared top-level catalog for third-party authorization login plugins.
  # 第三方授权登录插件共享的一级目录。
  - key: plugin:linapro-extid-core:auth-login
    # English source title; runtime i18n projects the localized catalog name.
    # 英文源标题；运行时 i18n 投影本地化目录名。
    name: Auth Login
    # Directory route segment for the shared authorization-login catalog.
    # 共享授权登录目录的路由片段。
    path: auth-login
    # Directory icon using an Iconify icon name.
    # 目录图标，使用 Iconify 图标名称。
    icon: lucide:key-round
    # Menu type enum. Allowed values: `D` directory, `M` menu page, `B` button permission node.
    # 菜单类型枚举。可选值：`D` 表示目录，`M` 表示菜单页面，`B` 表示按钮权限点。
    type: D
    # Place between AI Hub (sort 8) and the host extension catalog (sort 10).
    # 排序放在智能中心（sort=8）与扩展中心（sort=10）之间。
    sort: 9
    # Menu remark stored in host menu governance data.
    # 菜单备注，写入宿主菜单治理数据。
    remark: Shared catalog for third-party authorization login plugin settings
