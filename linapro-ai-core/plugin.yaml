  # Unique directory key for the AI Hub top-level plugin directory.
  # AI Hub 顶级插件目录唯一键。
  - key: plugin:linapro-ai-core:smart-center
    # Directory display name.
    # 目录显示名称。
    name: AI Hub
    # Directory route segment used as the AI Hub route namespace.
    # 目录路由片段，作为 AI Hub 路由命名空间。
    path: ai
    # Permission code required to access the AI Hub directory.
    # 访问 AI Hub 目录所需的权限标识。
    perms: ai:center:view
    # Menu icon using an Iconify icon name.
    # 菜单图标，使用 Iconify 图标名称。
    icon: lucide:brain-circuit
    # Menu type enum. Allowed values: `D` directory, `M` menu page, `B` button permission node.
    # 菜单类型枚举。可选值：`D` 表示目录，`M` 表示菜单页面，`B` 表示按钮权限点。
    type: D
    # Menu sort order; lower values appear earlier.
    # 菜单排序值，数值越小越靠前。
