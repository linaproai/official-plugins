# CLI tool, only in development environment.
# https://goframe.org/docs/cli
gfcli:
  gen:
    dao:
      - link: "pgsql:postgres:postgres@tcp(127.0.0.1:5432)/linapro?sslmode=disable"
        path: "internal"
        tables: "plugin_content_notice,sys_user"
        removePrefix: "plugin_content_"
        importPrefix: "lina-plugin-content-notice/backend/internal"
        descriptionTag: true
        noModelComment: true
