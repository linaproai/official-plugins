# Assemble the monorepo layout required by plugin go.mod replace directives
# and a temporary go.work that joins lina-core with every plugin module.
# 组装插件 go.mod replace 所需的 monorepo 目录布局，并生成把 lina-core
# 与各插件模块串联的临时 go.work。
name: Setup Plugin Workspace
description: Checkout linapro host core and build a plugin-local go.work for unit tests.

inputs:
  host-repository:
    description: Host monorepo (owner/name) that provides apps/lina-core.
    required: false
    default: linaproai/linapro
  host-ref:
    description: Host monorepo git ref (branch, tag, or SHA).
    required: false
    default: main
  plugins-path:
    description: Path where this official-plugins repository is checked out.
    required: false
    default: monorepo/apps/lina-plugins
  monorepo-path:
    description: Path where the host monorepo is checked out.
    required: false
    default: monorepo
  go-version:
    description: Go toolchain version for setup-go.
    required: false
    default: "1.25.x"

outputs:
  monorepo-path:
    description: Absolute or workspace-relative monorepo path.
    value: ${{ steps.paths.outputs.monorepo_path }}
  plugins-path:
    description: Absolute or workspace-relative plugins path.
    value: ${{ steps.paths.outputs.plugins_path }}
  gowork-path:
    description: Path to the generated go.work file.
    value: ${{ steps.gowork.outputs.gowork_path }}

runs:
  using: composite
  steps:
    # Record stable path outputs for downstream jobs/steps.
    # 记录供下游步骤使用的稳定路径输出。
    - name: Resolve Paths
      id: paths
      shell: bash
      run: |
        set -euo pipefail
        echo "monorepo_path=${{ inputs.monorepo-path }}" >> "${GITHUB_OUTPUT}"
        echo "plugins_path=${{ inputs.plugins-path }}" >> "${GITHUB_OUTPUT}"

    # Host provides apps/lina-core only; plugin sources come from this repository.
    # 宿主仅提供 apps/lina-core；插件源码来自本仓库检出。
    - name: Checkout Host Monorepo (lina-core)
      uses: actions/checkout@v5
      with:
        repository: ${{ inputs.host-repository }}
        ref: ${{ inputs.host-ref }}
        path: ${{ inputs.monorepo-path }}
        sparse-checkout: |
          apps/lina-core
        sparse-checkout-cone-mode: true

    # Overlay the official-plugins commit under test into the host layout.
    # 将待测 official-plugins 提交覆盖到宿主目录布局中。
    - name: Checkout Official Plugins
      uses: actions/checkout@v5
      with:
        path: ${{ inputs.plugins-path }}

    # Install Go before generating go.work so module tooling is available.
    # 在生成 go.work 前安装 Go，确保模块工具可用。
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache: true
        cache-dependency-path: |
          ${{ inputs.monorepo-path }}/apps/lina-core/go.sum
          ${{ inputs.plugins-path }}/**/go.sum

    # go.work must live at monorepo root so relative use paths resolve correctly.
    # go.work 必须放在 monorepo 根，相对 use 路径才能正确解析。
    - name: Generate Plugin go.work
      id: gowork
      shell: bash
      run: |
        set -euo pipefail
        monorepo="${{ inputs.monorepo-path }}"
        plugins="${{ inputs.plugins-path }}"
        gowork="${monorepo}/go.work.plugins.ci"
        {
          echo "go 1.25.0"
          echo ""
          echo "use ("
          echo "	./apps/lina-core"
          # Discover every plugin module that ships a go.mod.
          # 发现所有携带 go.mod 的插件模块。
          while IFS= read -r mod; do
            plugin_dir="$(dirname "${mod}")"
            plugin_id="$(basename "${plugin_dir}")"
            echo "	./apps/lina-plugins/${plugin_id}"
          done < <(find "${plugins}" -mindepth 2 -maxdepth 2 -type f -name go.mod | sort)
          echo ")"
        } > "${gowork}"
        echo "gowork_path=${gowork}" >> "${GITHUB_OUTPUT}"
        echo "Generated ${gowork}:"
        cat "${gowork}"
